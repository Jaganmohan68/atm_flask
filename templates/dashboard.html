<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATM Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Courier New", monospace;
}

body{
background:#0d1b2a;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
border-bottom:2px solid #00ffcc;
box-shadow:0 0 10px rgba(0,255,0,0.3);
}

.logo{
color:#00ffcc;
font-size:20px;
text-shadow:0 0 5px #00ffcc;
}

.nav-links{
display:flex;
align-items:center;
gap:15px;
}

.nav-links a{
text-decoration:none;
}

/* USER NAME STYLE */

.user-box{
color:#00ffcc;
border:1px solid #00ffcc;
padding:5px 10px;
border-radius:5px;
}

/* NAV BUTTONS */

.nav-btn{
padding:6px 12px;
border:1px solid #00ffcc;
background:transparent;
color:#00ffcc;
cursor:pointer;
transition:0.3s;
}

.nav-btn:hover{
background:#00ffcc;
color:black;
}

.logout{
border-color:red;
color:red;
}

.logout:hover{
background:red;
color:white;
}

/* ATM SCREEN */

.container{
height:calc(100vh - 70px);
display:flex;
justify-content:center;
align-items:center;
}

.atm-screen{
width:700px;
height:400px;
background:black;
border:10px solid #444;
border-radius:15px;
box-shadow:0 0 30px rgba(0,255,0,0.3);
position:relative;
padding:30px;
}

/* Header */

.header{
color:#00ffcc;
text-align:center;
margin-bottom:20px;
text-shadow:0 0 8px #00ffcc;
}

/* Menu */

.menu{
display:flex;
justify-content:space-between;
height:80%;
}

.options{
display:flex;
flex-direction:column;
justify-content:space-around;
}

.options a{
text-decoration:none;
}

.btn{
width:180px;
padding:10px;
border:2px solid #00ffcc;
color:#00ffcc;
background:transparent;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#00ffcc;
color:black;
box-shadow:0 0 10px #00ffcc;
}

/* Center */

.center{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#00ffcc;
text-align:center;
}

.footer{
position:absolute;
bottom:10px;
left:0;
right:0;
text-align:center;
color:#888;
font-size:12px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<div class="logo">🏧 ATM SYSTEM</div>

<div class="nav-links">

<!-- USER NAME HERE -->
<div class="user-box">
👤 {{request.cookies.get('user')}}
</div>

<a href="{{url_for('deposit')}}"><button class="nav-btn">Deposit</button></a>
<a href="{{url_for('withdraw')}}"><button class="nav-btn">Withdraw</button></a>
<a href="{{url_for('balance')}}"><button class="nav-btn">Balance</button></a>
<a href="{{url_for('userstatements')}}"><button class="nav-btn">Statement</button></a>
<a href="{{url_for('userlogout')}}"><button class="nav-btn logout">Exit</button></a>

</div>
</div>

<!-- ATM SCREEN -->

<div class="container">

<div class="atm-screen">

<div class="header">
<h2>SELECT TRANSACTION</h2>
</div>

<!-- REMOVED USER FROM HERE -->

<div class="menu">

<div class="options">
<a href="{{url_for('deposit')}}"><button class="btn">Deposit</button></a>
<a href="{{url_for('withdraw')}}"><button class="btn">Withdraw</button></a>
</div>

<div class="center">
<h2>Welcome</h2>
<p>Please choose an option</p>
</div>

<div class="options">
<a href="{{url_for('balance')}}"><button class="btn">Balance</button></a>
<a href="{{url_for('userstatements')}}"><button class="btn">Statement</button></a>
</div>

</div>

<!-- <div class="footer">
Press a button to continue
</div> -->

</div>

</div>

</body>
</html>
