<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Interface</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Courier New", monospace;
        }

        body {
            height: 100vh;
            background: #0d1b2a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .atm-screen {
            width: 420px;
            height: 300px;
            background: #000;
            border: 8px solid #444;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .atm-screen h1 {
            color: #00ffcc;
            margin-bottom: 25px;
            font-size: 22px;
            text-shadow: 0 0 8px #00ffcc;
        }

        .btn {
            width: 200px;
            padding: 10px;
            margin: 10px;
            border: 2px solid #00ffcc;
            background: transparent;
            color: #00ffcc;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00ffcc;
            color: black;
            box-shadow: 0 0 10px #00ffcc;
        }

        .footer {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="atm-screen">
        <h1>WELCOME</h1>

        <a href='{{url_for("reg")}}'>
            <button class="btn">Register</button>
        </a>

        <a href='{{url_for("login")}}'>
            <button class="btn">Login</button>
        </a>

        <!-- <div class="footer">Insert Card to Continue</div> -->
    </div>

</body>
</html>
