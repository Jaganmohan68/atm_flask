<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Courier New", monospace;
}

body{
background:#0d1b2a;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
border-bottom:2px solid #00ffcc;
color:#00ffcc;
}

.logo{
font-size:20px;
}

.nav-links{
display:flex;
align-items:center;
gap:15px;
}

.user-box{
border:1px solid #00ffcc;
padding:5px 10px;
border-radius:5px;
}

.nav-links a{
text-decoration:none;
}

.nav-btn{
padding:6px 12px;
border:1px solid #00ffcc;
background:transparent;
color:#00ffcc;
cursor:pointer;
}

.nav-btn:hover{
background:#00ffcc;
color:black;
}

.logout{
border-color:red;
color:red;
}

.logout:hover{
background:red;
color:white;
}

/* ATM SCREEN */

.container{
height:calc(100vh - 70px);
display:flex;
justify-content:center;
align-items:center;
}

.atm-box{
width:400px;
background:black;
border:8px solid #444;
border-radius:15px;
padding:30px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,0,0.3);
}

/* TEXT */

.title{
color:#00ffcc;
margin-bottom:20px;
text-shadow:0 0 8px #00ffcc;
}

/* INPUT */

input{
width:80%;
padding:12px;
background:black;
border:2px solid #00ffcc;
color:#00ffcc;
text-align:center;
font-size:18px;
outline:none;
border-radius:5px;
margin-bottom:20px;
}

input::placeholder{
color:#00ffcc;
opacity:0.6;
}

/* BUTTON */

.btn{
padding:10px 20px;
border:2px solid #00ffcc;
background:transparent;
color:#00ffcc;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#00ffcc;
color:black;
box-shadow:0 0 10px #00ffcc;
}

.footer{
margin-top:15px;
color:#888;
font-size:12px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">🏧 ATM SYSTEM</div>

<div class="nav-links">

<div class="user-box">
👤 {{request.cookies.get('user')}}
</div>

<a href="{{url_for('deposit')}}"><button class="nav-btn">Deposit</button></a>
<a href="{{url_for('withdraw')}}"><button class="nav-btn">Withdraw</button></a>
<a href="{{url_for('balance')}}"><button class="nav-btn">Balance</button></a>
<a href="{{url_for('userstatements')}}"><button class="nav-btn">Statement</button></a>
<a href="{{url_for('userlogout')}}"><button class="nav-btn logout">Exit</button></a>

</div>
</div>

<!-- ATM SCREEN -->

<div class="container">

<div class="atm-box">

<h2 class="title">ENTER DEPOSIT AMOUNT</h2>

<form method="post" action="{{url_for('deposit')}}">
    <input type="number" name="deposit_amt" placeholder="₹ Enter Amount" required>
    <br>
    <button class="btn" type="submit">Confirm</button>
</form>

<!-- <div class="footer">
Insert amount and press confirm
</div> -->

</div>

</div>

</body>
</html>
