<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Courier New", monospace;
        }

        body {
            height: 100vh;
            background: #0d1b2a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .atm-box {
            width: 400px;
            background: black;
            border: 6px solid #444;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0,255,0,0.3);
            text-align: center;
        }

        h2 {
            color: #00ffcc;
            margin-bottom: 20px;
            text-shadow: 0 0 6px #00ffcc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 5px;
            outline: none;
        }

        input::placeholder {
            color: #00ffcc;
            opacity: 0.7;
        }

        .btn {
            width: 95%;
            padding: 10px;
            margin-top: 15px;
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00ffcc;
            color: black;
            box-shadow: 0 0 10px #00ffcc;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #aaa;
            font-size: 13px;
            text-decoration: none;
        }

        .link:hover {
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="atm-box">
        <h2>CREATE ACCOUNT</h2>

        <form method="post">
            <input type="text" name="username" placeholder="Enter Name" required>
            <input type="password" name="userpassword" placeholder="Enter Password" required>
            <input type="email" name="useremail" placeholder="Enter Email" required>
            <input type="number" name="userpin" placeholder="Enter PIN" required>

            <!-- FIXED BUTTON -->
            <button type="submit" class="btn">Submit</button>
        </form>

        <a href='{{url_for("login")}}' class="link">Already have account? Login</a>
    </div>

</body>
</html>
